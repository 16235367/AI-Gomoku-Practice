<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全维度五子棋 (单机 AI / 联机 PvP)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { background-color: #0f172a; color: white; overflow: hidden; user-select: none; }
        .glass { background: rgba(30, 41, 59, 0.75); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .glass-btn { background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0)); border: 1px solid rgba(255,255,255,0.18); transition: all 0.3s; }
        .glass-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #3b82f6; cursor: pointer; margin-top: -8px; border: 2px solid white;}
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: rgba(255,255,255,0.2); }
        .piece-black { background: radial-gradient(circle at 30% 30%, #4b5563, #000000); box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .piece-white { background: radial-gradient(circle at 30% 30%, #ffffff, #9ca3af); box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .piece-rock { background: linear-gradient(135deg, #6b7280, #374151); }
        .highlight-last { border: 2px solid #ef4444; box-shadow: 0 0 12px #ef4444; }
    </style>
</head>
<body class="h-screen w-screen relative">

    <!-- 主菜单 -->
    <div id="mainMenu" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-slate-900">
        <h1 class="text-6xl font-black mb-12 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">全维度五子棋合集</h1>
        <div class="flex flex-col space-y-6 w-80">
            <button onclick="openOpponentModal('2D')" class="glass-btn py-4 rounded-xl text-xl font-bold text-emerald-400">▶ 经典 2D 模式</button>
            <button onclick="openOpponentModal('3D_NORMAL')" class="glass-btn py-4 rounded-xl text-xl font-bold text-blue-400">▶ 标准 3D 模式</button>
            <button onclick="openOpponentModal('3D_MELT')" class="glass-btn py-4 rounded-xl text-xl font-bold text-purple-400">▶ 融解 3D 模式</button>
        </div>
    </div>

    <!-- 弹窗 1：选择对战类型 -->
    <div id="opponentModal" class="hidden absolute inset-0 z-[60] flex items-center justify-center bg-black/60 backdrop-blur">
        <div class="glass p-8 rounded-2xl w-96 border border-white/20 shadow-2xl">
            <h2 class="text-2xl font-bold text-center mb-8">选择对战类型</h2>
            <div class="flex justify-between space-x-4">
                <button onclick="openColorModal()" class="flex-1 bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold transition">单机大战 AI</button>
                <button onclick="openRoomModal()" class="flex-1 bg-purple-600 hover:bg-purple-500 py-4 rounded-xl font-bold transition">联机真人 PvP</button>
            </div>
            <button onclick="document.getElementById('opponentModal').classList.add('hidden')" class="mt-6 w-full py-2 text-slate-400 hover:text-white transition">返回主菜单</button>
        </div>
    </div>

    <!-- 弹窗 2：单机选色 -->
    <div id="colorModal" class="hidden absolute inset-0 z-[70] flex items-center justify-center bg-black/60 backdrop-blur">
        <div class="glass p-8 rounded-2xl w-96 border border-white/20 shadow-2xl">
            <h2 class="text-2xl font-bold text-center mb-8">选择您的阵营</h2>
            <div class="flex justify-between space-x-4">
                <button onclick="startGameAI(1)" class="flex-1 bg-slate-800 hover:bg-slate-700 py-4 rounded-xl font-bold transition">执黑 (玩家先)</button>
                <button onclick="startGameAI(-1)" class="flex-1 bg-slate-100 hover:bg-white text-black py-4 rounded-xl font-bold transition">执白 (AI 先)</button>
            </div>
            <button onclick="document.getElementById('colorModal').classList.add('hidden')" class="mt-6 w-full py-2 text-slate-400 hover:text-white transition">返回</button>
        </div>
    </div>

    <!-- 弹窗 3：联机开房 -->
    <div id="roomModal" class="hidden absolute inset-0 z-[70] flex items-center justify-center bg-black/60 backdrop-blur">
        <div class="glass p-8 rounded-2xl w-96 border border-white/20 shadow-2xl">
            <h2 class="text-2xl font-bold text-center mb-4 text-purple-400">创建或加入房间</h2>
            <p class="text-sm text-slate-400 mb-6 text-center">输入房间号加入，留空则自动创建新房间。</p>
            <input type="text" id="roomInput" placeholder="例如: 1234" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 mb-6 text-center text-xl text-white outline-none focus:border-purple-500 transition">
            <button onclick="startGamePvP()" class="w-full bg-purple-600 hover:bg-purple-500 py-4 rounded-xl font-bold transition text-lg shadow-[0_0_15px_rgba(147,51,234,0.5)]">进入联机大厅</button>
            <button onclick="document.getElementById('roomModal').classList.add('hidden')" class="mt-6 w-full py-2 text-slate-400 hover:text-white transition">返回</button>
        </div>
    </div>

    <!-- 联机等待遮罩 -->
    <div id="waitingOverlay" class="hidden absolute inset-0 z-40 bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-purple-500 border-t-transparent rounded-full animate-spin mb-6"></div>
        <h1 class="text-4xl font-black text-white tracking-widest mb-4">等待对手加入...</h1>
        <p id="roomDisplayCode" class="text-2xl font-mono text-purple-400 bg-purple-900/50 px-6 py-2 rounded-lg border border-purple-500/30">房间号: ---</p>
    </div>

    <!-- 游戏主界面 -->
    <div id="gameUI" class="hidden h-full flex-col">
        <header class="glass w-full p-4 flex justify-between items-center z-10 border-b border-slate-700">
            <div class="flex items-center space-x-6">
                <h1 id="modeTitle" class="text-2xl font-black text-blue-400">模式</h1>
                <div id="scoreBoard" class="hidden px-4 py-1.5 bg-purple-900/40 border border-purple-500/30 rounded-lg">
                    <span id="scoreText" class="font-bold text-white">融解得分 >> 黑: 0/5 | 白: 0/5</span>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <div class="flex flex-col items-end mr-4">
                    <span id="roomInfoTop" class="text-xs font-mono text-slate-400 hidden mb-1">Room: 1234</span>
                    <span id="timerText" class="text-xl font-mono font-bold text-red-400">--</span>
                    <span id="statusText" class="text-sm font-bold text-emerald-400">就绪</span>
                </div>
                <button id="pauseBtn" onclick="togglePause()" class="px-5 py-2 bg-yellow-600 hover:bg-yellow-500 rounded-lg font-bold transition">暂停</button>
                <button id="undoBtn" onclick="handleUndo()" class="px-5 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg font-bold">悔棋</button>
                <button onclick="location.reload()" class="px-5 py-2 bg-red-600 hover:bg-red-500 rounded-lg font-bold">退出房间</button>
            </div>
        </header>

        <main class="flex-1 flex relative">
            <div id="pauseOverlay" class="hidden absolute inset-0 z-40 bg-black/60 backdrop-blur-sm flex items-center justify-center">
                <div class="text-center">
                    <h1 class="text-6xl font-black text-white tracking-widest mb-4">游戏已暂停</h1>
                    <p class="text-xl text-slate-300">您可以自由旋转右侧 3D 空间进行战局分析</p>
                </div>
            </div>

            <aside id="panel2D" class="w-[450px] h-full glass border-r border-slate-700 flex flex-col z-10">
                <div class="p-6 flex flex-col h-full">
                    <h2 class="text-lg font-bold text-blue-400 mb-2">2D 战术落子区</h2>
                    <div id="zControl" class="mb-4">
                        <div class="flex justify-between text-xs font-bold text-slate-400 mb-1">
                            <span>◀ 0 (底层)</span>
                            <span id="zLabel" class="text-blue-400 text-sm">当前深度 Z = 0</span>
                            <span id="zMaxLabel">Max (顶层) ▶</span>
                        </div>
                        <input type="range" id="zSlider" min="0" value="0" oninput="changeZ(this.value)">
                    </div>

                    <!-- ★ 赋予 ID 以便 JS 动态修改居中或上移对齐 ★ -->
                    <div id="gridContainer" class="flex-1 flex items-center justify-center relative">
                        <div class="relative pl-8 pt-8">
                            <div class="absolute top-2 left-8 right-0 flex items-center text-red-400 font-bold text-sm"><span>0</span> <div class="flex-1 h-px bg-red-400/50 mx-2"></div> <span>X 轴</span> <span class="ml-1">▶</span></div>
                            <div class="absolute left-1 top-8 bottom-0 flex flex-col items-center justify-between text-blue-400 font-bold text-sm"><span>0</span> <div class="w-px flex-1 bg-blue-400/50 my-2"></div> <span style="writing-mode: vertical-rl;">Y 轴</span> <span class="mt-1">▼</span></div>
                            <div id="grid2d" class="relative z-10 grid gap-[1px] p-2 bg-[#d4a373] rounded-lg border-4 border-[#bc6c25]"></div>
                        </div>
                    </div>
                </div>
            </aside>
            <div id="canvas3d" class="flex-1 relative cursor-move bg-[#0f172a]">
                <div id="axesLegend" class="hidden absolute top-4 left-4 bg-slate-900/70 p-3 rounded-lg text-sm text-white border border-white/10 shadow-lg">
                    <div class="font-bold mb-2 border-b border-white/20 pb-1">3D 坐标系说明</div>
                    <div class="flex items-center"><div class="w-3 h-3 bg-red-500 rounded-full mr-2"></div> X 轴 (横向列)</div>
                    <div class="flex items-center my-1"><div class="w-3 h-3 bg-blue-500 rounded-full mr-2"></div> Y 轴 (纵向行)</div>
                    <div class="flex items-center"><div class="w-3 h-3 bg-green-500 rounded-full mr-2"></div> Z 轴 (空间层高)</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ================= 全局状态与网络管理 =================
        let gameType = 'AI'; // 'AI' or 'PVP'
        let mode = '2D', size = 15, currentZ = 0, myColor = 1, currentTurn = 1;
        let isGameOver = false, timerObj, aiWaitObj, timeLeft = 60;
        let localState = null, lastMove = null;
        let isPaused = false, pausedTurn = null;
        let ws = null; // WebSocket 实例

        const API = {
            async init(m) { await fetch('/api/init', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({mode:m}) }); },
            async play(x, y, z, p) { let res = await fetch('/api/play', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({x,y,z,player:p}) }); return await res.json(); },
            async aiPlay(p) { let res = await fetch('/api/ai_play', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({player:p}) }); return await res.json(); },
            async undo() { let res = await fetch('/api/undo', { method: 'POST' }); return await res.json(); }
        };

        // ================= 菜单导航流 =================
        function openOpponentModal(m) { mode = m; document.getElementById('opponentModal').classList.remove('hidden'); }
        function openColorModal() { gameType = 'AI'; document.getElementById('opponentModal').classList.add('hidden'); document.getElementById('colorModal').classList.remove('hidden'); }
        function openRoomModal() { gameType = 'PVP'; document.getElementById('opponentModal').classList.add('hidden'); document.getElementById('roomModal').classList.remove('hidden'); }

        function setupBaseUI() {
            size = mode === '3D_NORMAL' ? 10 : 15;
            currentZ = mode === '2D' ? 0 : Math.floor(size/2);
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('colorModal').classList.add('hidden');
            document.getElementById('roomModal').classList.add('hidden');
            document.getElementById('gameUI').classList.replace('hidden', 'flex');

            let prefix = gameType === 'PVP' ? '[联机PvP] ' : '[单机AI] ';
            document.getElementById('modeTitle').innerText = prefix + mode;
            document.getElementById('zSlider').max = size - 1;
            document.getElementById('zMaxLabel').innerText = `${size - 1} (顶层) ▶`;
            document.getElementById('zSlider').value = currentZ;
            document.getElementById('zLabel').innerText = `当前深度 Z = ${currentZ}`;

            // ★ 优化：动态控制 2D 和 3D 模式下的布局对齐方式 ★
            const gridContainer = document.getElementById('gridContainer');

            if (mode === '2D') {
                document.getElementById('zControl').classList.add('hidden');
                document.getElementById('canvas3d').classList.add('hidden');
                document.getElementById('panel2D').classList.replace('w-[450px]', 'w-full');

                // 2D 模式下：取消垂直居中，改为顶部对齐并增加 pt-16
                gridContainer.classList.remove('items-center');
                gridContainer.classList.add('pt-16');
            } else {
                document.getElementById('scoreBoard').classList.toggle('hidden', mode !== '3D_MELT');
                document.getElementById('axesLegend').classList.remove('hidden');

                // 3D 模式下：恢复垂直居中，移除 pt-16
                gridContainer.classList.remove('pt-16');
                gridContainer.classList.add('items-center');

                Render3D.init();
            }
            localState = Array(size).fill().map(()=>Array(size).fill().map(()=>Array(size).fill(0)));
            render2DGrid();
            if (mode !== '2D') Render3D.sync(localState);
        }

        // ================= 单机 AI 模式启动 =================
        async function startGameAI(color) {
            myColor = color;
            currentTurn = 1;
            isGameOver = false;
            setupBaseUI();

            document.getElementById('pauseBtn').classList.remove('hidden');
            document.getElementById('undoBtn').classList.remove('hidden');
            document.getElementById('roomInfoTop').classList.add('hidden');

            await API.init(mode);
            if (myColor === 1) startTimer(60); else startAIWait(1);
        }

        // ================= 联机 PvP 模式启动与 WebSocket =================
        function startGamePvP() {
            let roomId = document.getElementById('roomInput').value.trim();
            if (!roomId) roomId = Math.floor(1000 + Math.random() * 9000).toString();

            setupBaseUI();

            document.getElementById('pauseBtn').classList.add('hidden');
            document.getElementById('undoBtn').classList.add('hidden');
            document.getElementById('roomInfoTop').classList.remove('hidden');
            document.getElementById('roomInfoTop').innerText = `网络房间: ${roomId}`;
            document.getElementById('statusText').innerText = "连接服务器...";

            document.getElementById('waitingOverlay').classList.remove('hidden');
            document.getElementById('roomDisplayCode').innerText = `房间号: ${roomId} (请发给对手)`;

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws/pvp/${roomId}/${mode}`);

            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);

                if (data.type === "error") {
                    alert(data.msg);
                    location.reload();
                }
                else if (data.type === "connected") {
                    myColor = data.color;
                    console.log(data.msg);
                }
                else if (data.type === "start") {
                    document.getElementById('waitingOverlay').classList.add('hidden');
                    isGameOver = false;
                    currentTurn = data.turn;
                    updatePvPStatus();
                }
                else if (data.type === "update") {
                    localState = data.state;
                    lastMove = data.lastMove;
                    currentTurn = data.turn;

                    if (mode !== '2D') {
                        currentZ = lastMove.z;
                        document.getElementById('zSlider').value = currentZ;
                        document.getElementById('zLabel').innerText = `当前深度 Z = ${currentZ}`;
                    }

                    render2DGrid();
                    if (mode !== '2D') Render3D.sync(localState);

                    if (mode === '3D_MELT') {
                        document.getElementById('scoreText').innerText = `融解得分 >> 黑: ${data.scores['1']}/5 | 白: ${data.scores['-1']}/5`;
                    }

                    if (data.isWin) {
                        isGameOver = true;
                        let winnerStr = data.winner === myColor ? "胜利！" : "失败...";
                        document.getElementById('statusText').innerText = `游戏结束！您${winnerStr}`;
                        setTimeout(() => alert(data.winner === myColor ? "恭喜，您在联机对战中获胜！" : "很遗憾，您输给了对手。"), 200);
                    } else {
                        updatePvPStatus();
                    }
                }
                else if (data.type === "opponent_left") {
                    isGameOver = true;
                    alert("对手已掉线或离开房间！");
                    location.reload();
                }
            };
        }

        function updatePvPStatus() {
            if (isGameOver) return;
            if (currentTurn === myColor) {
                document.getElementById('statusText').innerText = "您的回合 (请落子)";
                document.getElementById('statusText').className = "text-sm font-bold text-emerald-400";
            } else {
                document.getElementById('statusText').innerText = "等待对手落子...";
                document.getElementById('statusText').className = "text-sm font-bold text-orange-400 animate-pulse";
            }
        }

        // ================= 核心操作逻辑 =================
        async function onPlayerClick(x, y) {
            if (isGameOver || isPaused || currentTurn !== myColor) return;

            if (gameType === 'PVP') {
                ws.send(JSON.stringify({ action: "play", x: x, y: y, z: currentZ }));
            } else {
                const res = await API.play(x, y, currentZ, myColor);
                if (res.success) handleMoveResultAI(res, myColor);
            }
        }

        function handleMoveResultAI(res, player) {
            localState = res.state;
            lastMove = res.lastMove;
            render2DGrid();
            if (mode !== '2D') Render3D.sync(localState);

            if (mode === '3D_MELT') {
                document.getElementById('scoreText').innerText = `融解得分 >> 黑: ${res.scores['1']}/5 | 白: ${res.scores['-1']}/5`;
            }

            if (res.isWin) {
                isGameOver = true;
                clearInterval(timerObj); clearInterval(aiWaitObj);
                document.getElementById('statusText').innerText = `${player === myColor ? '玩家' : 'AI'} 获胜！`;
                setTimeout(() => alert("游戏结束！"), 100);
            } else {
                currentTurn = -player;
                if (currentTurn === myColor) startTimer(60); else startAIWait(5);
            }
        }

        function changeZ(val) {
            currentZ = parseInt(val);
            document.getElementById('zLabel').innerText = `当前深度 Z = ${currentZ}`;
            render2DGrid();
            if (mode !== '2D') Render3D.highlightLayer(currentZ);
        }

        function render2DGrid() {
            const grid = document.getElementById('grid2d');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${size}, minmax(0, 1fr))`;
            let pxSize = mode === '2D' ? '600px' : '350px';
            grid.style.width = pxSize; grid.style.height = pxSize;

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell w-full aspect-square border border-white/10 flex items-center justify-center cursor-pointer';
                    cell.onclick = () => onPlayerClick(x, y);

                    const p = mode === '2D' ? localState[0][y][x] : localState[currentZ][y][x];
                    if (p !== 0) {
                        const pDiv = document.createElement('div');
                        pDiv.className = `w-[85%] h-[85%] rounded-full ${p===1?'piece-black':(p===-1?'piece-white':'piece-rock')}`;
                        if (lastMove && lastMove.x === x && lastMove.y === y && lastMove.z === (mode==='2D'?0:currentZ) && p !== 2) {
                            pDiv.classList.add('highlight-last');
                        }
                        cell.appendChild(pDiv);
                    }
                    grid.appendChild(cell);
                }
            }
        }

        // ================= 定时器与控制 =================
        function togglePause() {
            if (isGameOver || gameType === 'PVP') return;
            const btn = document.getElementById('pauseBtn');
            const overlay = document.getElementById('pauseOverlay');

            if (isPaused) {
                isPaused = false;
                overlay.classList.add('hidden');
                btn.innerText = '暂停';
                btn.classList.replace('bg-emerald-600', 'bg-yellow-600');
                btn.classList.replace('hover:bg-emerald-500', 'hover:bg-yellow-500');
                if (pausedTurn === 'HUMAN') startTimer(timeLeft);
                else if (pausedTurn === 'AI') startAIWait(aiWaitLeft);
            } else {
                isPaused = true;
                overlay.classList.remove('hidden');
                btn.innerText = '▶ 继续';
                btn.classList.replace('bg-yellow-600', 'bg-emerald-600');
                btn.classList.replace('hover:bg-yellow-500', 'hover:bg-emerald-500');
                clearInterval(timerObj); clearInterval(aiWaitObj);
                pausedTurn = currentTurn === myColor ? 'HUMAN' : 'AI';
            }
        }

        function startTimer(initialTime) {
            clearInterval(timerObj); clearInterval(aiWaitObj);
            timeLeft = initialTime;
            document.getElementById('statusText').innerText = "您的回合 (请落子)";
            document.getElementById('statusText').className = "text-sm font-bold text-emerald-400";

            timerObj = setInterval(() => {
                if(isPaused) return;
                document.getElementById('timerText').innerText = `${--timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(timerObj);
                    document.getElementById('statusText').innerText = "超时代下...";
                    API.aiPlay(myColor).then(res => handleMoveResultAI(res, myColor));
                }
            }, 1000);
        }

        let aiWaitLeft = 5;
        function startAIWait(initialTime) {
            clearInterval(timerObj); clearInterval(aiWaitObj);
            aiWaitLeft = initialTime;
            document.getElementById('timerText').innerText = "--";

            aiWaitObj = setInterval(() => {
                if(isPaused) return;
                document.getElementById('statusText').innerText = `等待 AI 落子... (${--aiWaitLeft}s)`;
                document.getElementById('statusText').className = "text-sm font-bold text-orange-400 animate-pulse";
                if (aiWaitLeft <= 0) {
                    clearInterval(aiWaitObj);
                    document.getElementById('statusText').innerText = "AI 云端矩阵算力全开中...";
                    API.aiPlay(-myColor).then(res => {
                        if (mode !== '2D' && res.move) {
                            currentZ = res.move.z;
                            document.getElementById('zSlider').value = currentZ;
                            changeZ(currentZ);
                        }
                        handleMoveResultAI(res, -myColor);
                    });
                }
            }, 1000);
        }

        async function handleUndo() {
            if (isGameOver || isPaused || gameType === 'PVP') return;
            if (currentTurn !== myColor) {
                const res = await API.undo();
                if (res.success) {
                    localState = res.state; lastMove = res.lastMove;
                    currentTurn = myColor;
                    render2DGrid();
                    if (mode !== '2D') Render3D.sync(localState);
                    startTimer(60);
                }
            } else {
                await API.undo();
                const res = await API.undo();
                if (res.success) {
                    localState = res.state; lastMove = res.lastMove;
                    render2DGrid();
                    if (mode !== '2D') Render3D.sync(localState);
                    startTimer(60);
                }
            }
        }

        // ================= Three.js 渲染 =================
        const Render3D = {
            scene: null, camera: null, renderer: null, controls: null,
            pieceGroup: null, layerGroup: null, lastMoveRing: null, SPACING: 1.2,

            init() {
                if (this.scene) return;
                const container = document.getElementById('canvas3d');
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
                this.camera.position.set(18, 18, 22);

                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setSize(container.clientWidth, container.clientHeight);
                container.appendChild(this.renderer.domElement);

                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;

                this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(10, 20, 10);
                this.scene.add(dirLight);

                this.pieceGroup = new THREE.Group();
                this.layerGroup = new THREE.Group();
                this.scene.add(this.pieceGroup);
                this.scene.add(this.layerGroup);

                const offset = (size - 1) * this.SPACING / 2;
                const axesLength = size * this.SPACING + 2;
                const axesHelper = new THREE.AxesHelper(axesLength);
                axesHelper.position.set(-offset, -offset, -offset);
                this.scene.add(axesHelper);

                this.drawGrid();
                this.highlightLayer(currentZ);

                const animate = () => {
                    requestAnimationFrame(animate);
                    this.controls.update();
                    if (this.lastMoveRing && !isPaused) {
                        this.lastMoveRing.rotation.z += 0.03;
                        this.lastMoveRing.scale.setScalar(1 + Math.sin(Date.now()*0.005)*0.1);
                    }
                    this.renderer.render(this.scene, this.camera);
                };
                animate();
            },

            drawGrid() {
                const mat = new THREE.LineBasicMaterial({ color: 0x334155, transparent: true, opacity: 0.3 });
                const offset = (size - 1) * this.SPACING / 2;
                for (let i = 0; i < size; i++) {
                    for (let j = 0; j < size; j++) {
                        const pi = i * this.SPACING - offset, pj = j * this.SPACING - offset;
                        this.scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-offset, pi, pj), new THREE.Vector3(offset, pi, pj)]), mat));
                        this.scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(pi, -offset, pj), new THREE.Vector3(pi, offset, pj)]), mat));
                        this.scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(pi, pj, -offset), new THREE.Vector3(pi, pj, offset)]), mat));
                    }
                }
            },

            sync(state) {
                while(this.pieceGroup.children.length > 0) this.pieceGroup.remove(this.pieceGroup.children[0]);
                const offset = (size - 1) * this.SPACING / 2;

                for (let z=0; z<size; z++) {
                    for (let y=0; y<size; y++) {
                        for (let x=0; x<size; x++) {
                            const p = state[z][y][x];
                            if (p !== 0) {
                                let geo, mat;
                                if (p === 2) {
                                    geo = new THREE.BoxGeometry(this.SPACING*0.6, this.SPACING*0.6, this.SPACING*0.6);
                                    mat = new THREE.MeshStandardMaterial({ color: 0x6b7280 });
                                } else {
                                    geo = new THREE.SphereGeometry(this.SPACING*0.4, 32, 32);
                                    mat = new THREE.MeshStandardMaterial({ color: p===1?0x111111:0xffffff, roughness: 0.2, metalness: p===1?0.8:0.1 });
                                }
                                const mesh = new THREE.Mesh(geo, mat);
                                mesh.position.set(x*this.SPACING - offset, (z*this.SPACING - offset), y*this.SPACING - offset);
                                this.pieceGroup.add(mesh);
                            }
                        }
                    }
                }

                if (this.lastMoveRing) this.scene.remove(this.lastMoveRing);
                if (lastMove && state[lastMove.z][lastMove.y][lastMove.x] !== 2) {
                    const geo = new THREE.RingGeometry(this.SPACING*0.5, this.SPACING*0.6, 32);
                    const mat = new THREE.MeshBasicMaterial({ color: 0xef4444, side: THREE.DoubleSide });
                    this.lastMoveRing = new THREE.Mesh(geo, mat);
                    this.lastMoveRing.position.set(lastMove.x*this.SPACING - offset, (lastMove.z*this.SPACING - offset) + 0.05, lastMove.y*this.SPACING - offset);
                    this.lastMoveRing.rotation.x = Math.PI / 2;
                    this.scene.add(this.lastMoveRing);
                }
            },

            highlightLayer(z) {
                while(this.layerGroup.children.length > 0) this.layerGroup.remove(this.layerGroup.children[0]);
                const plane = new THREE.Mesh(
                    new THREE.PlaneGeometry(size * this.SPACING, size * this.SPACING),
                    new THREE.MeshBasicMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.15, side: THREE.DoubleSide })
                );
                plane.rotation.x = Math.PI / 2;
                plane.position.y = (z * this.SPACING - (size - 1) * this.SPACING / 2);
                this.layerGroup.add(plane);
            }
        };
    </script>
</body>
</html>
